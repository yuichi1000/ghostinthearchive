services:
  curator:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["services/curator.py"]
    ports:
      - "8001:8080"
    environment:
      - PORT=8080
      - GOOGLE_CLOUD_PROJECT=ghostinthearchive
      - GOOGLE_GENAI_USE_VERTEXAI=TRUE
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/adc.json
      - FIRESTORE_EMULATOR_HOST=host.docker.internal:8080
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/keys/adc.json:ro

  # NOTE: Pipeline Server runs on port 8002 (Curator on 8001) because they are
  # separate services with different resource/timeout requirements.
  # See services/pipeline_server.py docstring for details.
  pipeline-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["services/pipeline_server.py"]
    ports:
      - "8002:8080"
    environment:
      - PORT=8080
      - GOOGLE_CLOUD_PROJECT=ghostinthearchive
      - GOOGLE_GENAI_USE_VERTEXAI=TRUE
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/adc.json
      - FIRESTORE_EMULATOR_HOST=host.docker.internal:8080
      - STORAGE_EMULATOR_HOST=http://host.docker.internal:9199
      - STORAGE_EMULATOR_PUBLIC_HOST=http://localhost:9199
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/keys/adc.json:ro
