# Cloud Build configuration for web-public (SSG)
# Triggered when a mystery is published
# 7言語 × N記事 の静的ページを生成

steps:
  # ルートで依存インストール（workspaces で @ghost/shared をローカル解決）
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  # Build static site
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'web-public'
    env:
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - 'NEXT_PUBLIC_GTM_ID=$_GTM_ID'

  # SSG 出力に記事ページが含まれることを検証（空デプロイ防止）
  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - |
        count=$(find out/en/mystery -name "index.html" 2>/dev/null | wc -l)
        echo "Generated article pages: $count"
        if [ "$count" -eq "0" ]; then
          echo "ERROR: 記事ページが0件です。Firestore 接続エラーの可能性があります。デプロイを中止します。"
          exit 1
        fi
    dir: 'web-public'

  # Deploy to Firebase Hosting
  - name: 'us-docker.pkg.dev/firebase-cli/us/firebase'
    args: ['deploy', '--only', 'hosting:public', '--project', '$PROJECT_ID']
    dir: 'web-public'

substitutions:
  _GTM_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: '1800s'
